<!DOCTYPE html>
<html>
<head>
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css">
  <script src="utils.js"></script>
</head>
<body onload="iniciarJuego()">

  <div class="container">

    <header>
      <h1>🎯 Juego Cazando</h1>
      <p class="autor">Autor: Cynthia Cacuango</p>
    </header>

    <section class="game-area fondo">
  <canvas id="areaJuego" width="500" height="500"></canvas>
</section>

    <section class="panel">
      <div class="card">
        <span>Puntos</span>
        <strong id="puntos">0</strong>
      </div>
      <div class="card">
        <span>Tiempo</span>
        <strong id="tiempo">10</strong>
      </div>
      <div class="card">
        <button onclick="reiniciar();">Reiniciar</button>
      </div>
    </section>

    <section class="controles">
      <button id="btnArriba" onclick="moverArriba();">⬆</button>

      <div class="middle-controls">
        <button id="btnIzquierda" onclick="moverIzquierda();">⬅</button>
        <button id="btnAbajo" onclick="moverAbajo();">⬇</button>
        <button id="btnDerecha" onclick="moverDerecha();">➡</button>
      </div>
    </section>

    <p id="mensaje"></p>

  </div>

  <script src="cazando.js"></script>
</body>
</html>
