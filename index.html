<!DOCTYPE html>
<html>
<head>
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css">
  <script src="utils.js"></script>
</head>
<body onload="iniciarJuego()">
  <div class="shooting-stars">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>
  <div class="container">

    <header>
      <h1>🎯 Juego Cazando</h1>
      <p class="autor">Autor: Cynthia Cacuango</p>
    </header>

    <section class="game-area fondo">
  <canvas id="areaJuego" width="500" height="500"></canvas>
</section>

    <section class="panel">
  <div class="card neon-card">
    <span>Puntos</span>
    <strong id="puntos">0</strong>
  </div>
  <div class="card neon-card">
    <span>Tiempo</span>
    <strong id="tiempo">20</strong>
  </div>
  <div class="card neon-card">
    <button class="btn-reiniciar" onclick="reiniciar();">Reiniciar</button>
  </div>
</section>

<section class="controles">
  <button id="btnArriba" class="btn-control" onclick="moverArriba();">⬆</button>

  <div class="middle-controls">
    <button id="btnIzquierda" class="btn-control" onclick="moverIzquierda();">⬅</button>
    <button id="btnAbajo" class="btn-control" onclick="moverAbajo();">⬇</button>
    <button id="btnDerecha" class="btn-control" onclick="moverDerecha();">➡</button>
  </div>
</section>

    <p id="mensaje"></p>

  </div>

  <script src="cazando.js"></script>
</body>
</html>
